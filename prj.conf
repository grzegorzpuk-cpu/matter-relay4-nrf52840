# Enable CHIP
CONFIG_CHIP=y
CONFIG_CHIP_PROJECT_CONFIG="src/chip_project_config.h"

# ZAP file (skopiowany z light_bulb, 1 endpoint OnOff; EP2-EP4 dynamiczne)
CONFIG_NCS_SAMPLE_MATTER_ZAP_FILE_PATH="${APPLICATION_CONFIG_DIR}/src/default_zap/light_bulb.zap"

# Product ID dla relay4 (przykładowy)
CONFIG_CHIP_DEVICE_PRODUCT_ID=32784
CONFIG_STD_CPP17=y

# Automatyczne parowanie przy starcie
CONFIG_CHIP_ENABLE_PAIRING_AUTOSTART=y

# BLE advertising
CONFIG_CHIP_BLE_EXT_ADVERTISING=y
CONFIG_CHIP_BLE_ADVERTISING_DURATION=60

# Obsługa przycisków i LEDów na DK
CONFIG_DK_LIBRARY=y

# GPIO dla przekaźników (zamiast PWM)
CONFIG_GPIO=y

# Wyłącz PWM (nie używamy)
CONFIG_PWM=n

# Bluetooth
CONFIG_BT_DEVICE_NAME="MatterRelay4"

# Inne
CONFIG_THREAD_NAME=y
CONFIG_MPU_STACK_GUARD=y
CONFIG_RESET_ON_FATAL_ERROR=n
CONFIG_CHIP_LIB_SHELL=y
CONFIG_NCS_SAMPLE_MATTER_TEST_SHELL=y

# Rozmiar
CONFIG_USE_SEGGER_RTT=n

# Factory Data
CONFIG_CHIP_FACTORY_DATA=y
CONFIG_CHIP_FACTORY_DATA_BUILD=y
