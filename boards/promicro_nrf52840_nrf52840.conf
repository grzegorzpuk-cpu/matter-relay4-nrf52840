# Disable QSPI NOR (no external flash on Pro Micro)
CONFIG_CHIP_QSPI_NOR=n

# Disable NFC onboarding (Pro Micro has no NFC antenna, NFCT pins used as GPIOs)
CONFIG_CHIP_NFC_ONBOARDING_PAYLOAD=n

# Disable OTA DFU (no MCUboot)
CONFIG_CHIP_OTA_REQUESTOR=n

# Enable USB CDC ACM for console output
CONFIG_USB_DEVICE_STACK=y
CONFIG_UART_LINE_CTRL=y

# Reduce binary size
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_CHIP_LIB_SHELL=n
CONFIG_NCS_SAMPLE_MATTER_TEST_SHELL=n
CONFIG_CHIP_MEMORY_PROFILING=n
CONFIG_USE_SEGGER_RTT=n
CONFIG_SHELL_MINIMAL=y
CONFIG_ASSERT=n
CONFIG_RESET_ON_FATAL_ERROR=y
